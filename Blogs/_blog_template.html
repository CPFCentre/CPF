<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Title Here - CPFC Blog</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<!--
==========================================================
  HOW TO ADD A NEW BLOG POST MANUALLY
==========================================================
  Option A (recommended): Use the CPFC Blog Publisher app.
  Option B (manual):
    1. Copy this file to Blogs/your-post-name.html
    2. Fill in every field marked  <- CHANGE THIS
    3. Add a card entry to Blog.html (see ADD NEW POSTS ABOVE HERE comment)
==========================================================
-->
<body class="page-body">
<!-- student-story -->   <- REMOVE THIS LINE if not a student story

    <div class="page-banner">
        <img src="../Images/Logos/Navpicture.jpg" alt="Blog">
        <div class="banner-overlay">
            <h1 class="banner-title">Blog</h1>
        </div>
    </div>

    <div class="blog-post-wrap">

        <main class="blog-post-main">
            <img class="hero-img" src="../Images/YOUR_IMAGE.jpg" alt="Post title" loading="lazy">  <!-- <- CHANGE -->

            <h2>Your Post Title Here</h2>  <!-- <- CHANGE -->

            <p class="blog-post-meta">
                <strong>Author:</strong> Author Name &nbsp;&bull;&nbsp;  <!-- <- CHANGE -->
                <strong>Date:</strong> 1 January 2025                   <!-- <- CHANGE -->
            </p>

            <div class="post-body">
                <!--
                  Write your content here using these helpers:
                    Paragraph:       <p>Your text here.</p>
                    Subheading:      <h3>Your subheading</h3>
                    Image right:     <img style="width:45%;float:right;margin:0 0 14px 18px;border-radius:4px;" src="../Images/x.jpg" alt="" loading="lazy">
                    YouTube video:   <div style="position:relative;padding-top:56.25%;margin:16px 0;">
                                       <iframe style="position:absolute;top:0;left:0;width:100%;height:100%;"
                                         src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>
                                     </div>
                    Local video:     <video controls style="width:100%;border-radius:4px;margin:12px 0;" preload="metadata">
                                       <source src="../Videos/myvideo.mp4">
                                     </video>
                    Link:            <a href="https://example.com" target="_blank" rel="noopener">Link text</a>
                -->

                <p>Write your opening paragraph here.</p>

                <p>Continue the story here.</p>

                <div style="clear:both"></div>
            </div>
        </main>

        <aside class="blog-sidebar">
            <div class="sidebar-section">
                <h3>Other Posts</h3>
                <!-- Copy sidebar-post blocks from another blog post file -->
            </div>
            <div class="sidebar-section">
                <h3>Student Stories</h3>
                <!-- Copy student story sidebar-post blocks here -->
            </div>
        </aside>

    </div>

    <script src="../components.js"></script>
    <script>loadComponents('Blog');</script>
</body>
</html>
